<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoliceGrievance | Official UP Police Citizen Portal</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3662/3662669.png" />
  <!-- Fonts: Outfit for display, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003366', // Deep Police Blue
            secondary: '#C8102E', // Authority Crimson
            accent: '#FFD700', // Gold accents
            dark: '#020617',
            success: '#10b981',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- AOS (Animate on Scroll) -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-[#F8FAFC] font-sans text-slate-900 overflow-x-hidden">

  <!-- ─── Authority Navigation ─── -->
  <header id="main-header" class="fixed top-0 left-0 w-full z-[100] transition-all duration-500 bg-white/95 backdrop-blur-xl shadow-md md:bg-transparent md:backdrop-blur-none md:shadow-none">
    <nav id="main-nav" class="h-20 md:h-24 transition-all duration-500">
      <!-- Injected by app.js -->
    </nav>
  </header>

  <!-- ─── Main Content ─── -->
  <main id="app" class="min-h-screen lg:h-screen pt-20 md:pt-24 overflow-y-auto lg:overflow-hidden flex flex-col">
    <!-- Landing Hero Section -->
    <section id="landing-hero" class="flex-1 flex items-center justify-center p-4 sm:p-6 my-4 lg:my-0">
      <div class="max-w-7xl w-full h-full flex">
        <div class="bg-white rounded-[24px] sm:rounded-[40px] overflow-hidden shadow-[0_40px_100px_-20px_rgba(0,51,102,0.1)] flex flex-col lg:flex-row items-stretch w-full">
          <div class="p-6 sm:p-10 lg:p-16 flex-1 flex flex-col justify-center" data-aos="fade-right">
            <div class="inline-flex items-center gap-2 text-secondary font-black uppercase tracking-[0.3em] text-[10px] mb-4">
               <span class="w-3 h-3 bg-secondary rounded-full animate-pulse"></span>
               Official Command Portal
            </div>
            <h1 class="font-display text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black text-slate-900 leading-[0.95] mb-6 tracking-tighter">
              Citizen <br> <span class="text-primary italic">Safety Bureau.</span>
            </h1>
            <p class="text-slate-500 text-base sm:text-lg lg:text-xl font-medium mb-8 max-w-lg leading-relaxed">
              Official Digital Grievance Cell of Uttar Pradesh Police. Rapid response for every citizen.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 w-full">
              <button onclick="navigate('submit')" class="w-full sm:w-auto bg-primary text-white px-6 sm:px-10 py-4 sm:py-5 rounded-[16px] sm:rounded-[20px] font-black text-base sm:text-lg shadow-2xl shadow-primary/40 hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-4">
                <i class="fa-solid fa-file-signature"></i>
                File Grievance
              </button>
              <button onclick="navigate('track')" class="w-full sm:w-auto bg-slate-50 border-2 border-slate-100 text-slate-900 px-6 sm:px-10 py-4 sm:py-5 rounded-[16px] sm:rounded-[20px] font-black text-base sm:text-lg hover:bg-slate-100 active:scale-95 transition-all text-center">Track Status</button>
            </div>
          </div>
          <div class="hidden lg:flex flex-1 bg-slate-50 relative overflow-hidden group items-center justify-center">
             <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#003366_2px,transparent_2px)] [background-size:32px_32px]"></div>
             <div class="relative w-full max-w-md aspect-square bg-white rounded-[40px] shadow-2xl p-8 transform group-hover:rotate-2 transition-transform duration-700">
                <div class="flex items-center justify-between mb-8">
                   <div class="w-12 h-12 bg-primary/10 text-primary rounded-xl flex items-center justify-center"><i class="fa-solid fa-building-shield"></i></div>
                   <div class="text-right"><div class="font-black text-slate-900 text-sm">UP POLICE HQ</div><div class="text-[10px] font-bold text-slate-400">COMMAND CENTER</div></div>
                </div>
                <div class="space-y-4">
                   <div class="h-10 bg-slate-50 rounded-xl border-l-4 border-secondary flex items-center px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Dispatch #7284</div>
                   <div class="h-32 bg-slate-50 rounded-[24px] p-6 flex flex-col justify-center">
                      <div class="h-3 bg-slate-200 rounded-full w-3/4 mb-3"></div>
                      <div class="h-3 bg-slate-200 rounded-full w-1/2"></div>
                   </div>
                   <div class="flex gap-3">
                      <div class="h-16 bg-primary rounded-2xl flex-1 flex items-center justify-center text-white"><i class="fa-solid fa-fingerprint"></i></div>
                      <div class="h-16 bg-slate-100 rounded-2xl flex-1"></div>
                   </div>
                </div>
             </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Authority Triage Dashboard -->
    <div id="main-view" class="flex-1 overflow-y-auto no-scrollbar hidden">
      <!-- Dynamic Pages Injected Here -->
    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="app.js"></script>
  <script>
    AOS.init({ duration: 1000, once: true });
    
    window.addEventListener('scroll', () => {
      const header = document.getElementById('main-header');
      const nav = document.getElementById('main-nav');
      if (window.scrollY > 50) {
        header.classList.add('bg-white/95', 'backdrop-blur-xl', 'shadow-2xl');
        header.classList.remove('md:bg-transparent', 'md:backdrop-blur-none', 'md:shadow-none');
        nav.classList.remove('h-20', 'md:h-24');
        nav.classList.add('h-16', 'md:h-20');
      } else {
        if (window.innerWidth >= 768) {
          header.classList.remove('bg-white/95', 'backdrop-blur-xl', 'shadow-2xl');
          header.classList.add('md:bg-transparent', 'md:backdrop-blur-none', 'md:shadow-none');
        }
        nav.classList.remove('h-16', 'md:h-20');
        nav.classList.add('h-20', 'md:h-24');
      }
    });
  </script>
</body>
</html>
